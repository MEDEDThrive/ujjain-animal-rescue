<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjain Animal Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-red: #e11d48; --soft-red: #fef2f2; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-red); margin: 0; padding: 0; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--primary-red); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 1000; animation: fadeOut 2s forwards 2s; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Main App Container */
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--white); box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 30px; }
        
        /* Header / Founder */
        .founder-header { background: var(--primary-red); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid white; background: #ddd; margin-bottom: 10px; }
        
        /* Big Navigation Cards */
        .nav-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        .nav-card { background: var(--white); border: 2px solid var(--primary-red); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.1); }
        .nav-card i { font-size: 40px; color: var(--primary-red); margin-bottom: 10px; }
        .nav-card h3 { color: var(--primary-red); margin: 0; font-size: 18px; }

        /* Form Styling */
        .page { display: none; padding: 20px; }
        .active { display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin: 10px 0; box-sizing: border-box; }
        .btn-submit { background: var(--primary-red); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <i class="fas fa-paw" style="font-size: 50px; margin-bottom: 20px;"></i>
        <h1>Bejuban ki Pukar</h1>
    </div>

    <div class="app-container">
        <!-- Founder Profile -->
        <div class="founder-header">
            <div class="profile-pic" style="background: url('YOUR_PHOTO_URL') center/cover;"></div>
            <h2 style="margin: 0;">Raj Malviya</h2>
            <p style="margin: 0; opacity: 0.9;">Founder, Ujjain Animal Rescue</p>
        </div>

        <!-- Home Section -->
        <div id="home" class="page active">
            <div class="nav-grid">
                <div class="nav-card" onclick="showPage('rescue-form')">
                    <i class="fas fa-notes-medical"></i>
                    <h3>Rescue Request</h3>
                </div>
                <div class="nav-card" onclick="showPage('history')">
                    <i class="fas fa-history"></i>
                    <h3>Rescue History</h3>
                </div>
                <div class="nav-card" onclick="showPage('live-req')">
                    <i class="fas fa-globe"></i>
                    <h3>Live Requests</h3>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div id="rescue-form" class="page">
            <h2 style="color: var(--primary-red);">New Request</h2>
            <form>
                <select><option>Pashu ka Prakar</option></select>
                <input type="file" accept="image/*" placeholder="Ghav/Pashu ki Photo">
                <input type="text" placeholder="Live Location" id="location-input">
                <input type="tel" placeholder="Mobile Number">
                <input type="file" accept="image/*" placeholder="Aapki Photo">
                <button type="button" class="btn-submit">Pay ₹30 & Submit</button>
            </form>
            <button onclick="showPage('home')" style="background:none; border:none; color:gray; margin-top:20px;">Back to Home</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        // Simple location trigger
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('location-input').value = "Lat: " + pos.coords.latitude.toFixed(4) + ", Long: " + pos.coords.longitude.toFixed(4);
            });
        }
    </script>
</body>
</html>
