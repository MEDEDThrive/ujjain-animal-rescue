<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejuban ki Pukar - Ujjain</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-red: #e11d48; }
        body { font-family: sans-serif; background: #fff1f2; margin: 0; }
        .app-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 20px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .req-card { border: 1px solid #ddd; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #fff; }
        .req-card img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn-submit { background: var(--primary-red); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <h2>Bejuban ki Pukar</h2>
        <button onclick="showPage('rescue-form')">New Rescue Request</button>
        <button onclick="showPage('live-req')">View Live Requests</button>
    </div>

    <!-- FORM PAGE -->
    <div id="rescue-form" class="page">
        <button onclick="showPage('home')">Back</button>
        <form id="rescue-form-data">
            <input type="text" id="r-name" placeholder="Aapka Naam" required>
            <input type="tel" id="r-phone" placeholder="Mobile Number" required>
            <select id="a-type"><option>Gai</option><option>Bachhda</option></select>
            <label>Pashu ki Photo:</label>
            <input type="file" id="a-photo" accept="image/*">
            <button type="button" class="btn-submit" onclick="saveData()">Submit</button>
        </form>
    </div>

    <!-- LIVE REQUESTS PAGE -->
    <div id="live-req" class="page">
        <button onclick="showPage('home')">Back</button>
        <div id="live-list"></div>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'live-req') renderData();
    }

    function saveData() {
        const file = document.getElementById('a-photo').files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const data = {
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-phone').value,
                animal: document.getElementById('a-type').value,
                photo: e.target.result,
                time: new Date().getTime()
            };
            let allReq = JSON.parse(localStorage.getItem('allRequests') || '[]');
            allReq.push(data);
            localStorage.setItem('allRequests', JSON.stringify(allReq));
            alert("Submitted!");
            showPage('home');
        };
        reader.readAsDataURL(file);
    }

    function renderData() {
        const list = document.getElementById('live-list');
        const data = JSON.parse(localStorage.getItem('allRequests') || '[]');
        list.innerHTML = "";
        data.forEach(req => {
            const timeLeft = Math.floor(((req.time + 7200000) - new Date().getTime()) / 60000);
            if(timeLeft > 0) {
                list.innerHTML += `
                    <div class="req-card">
                        <img src="${req.photo}">
                        <p>Naam: ${req.name}</p>
                        <p>Pashu: ${req.animal}</p>
                        <p>Time Left: ${timeLeft} min</p>
                    </div>`;
            }
        });
    }
</script>
</body>
</html>
