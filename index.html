<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjain Animal Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-red: #e11d48; --soft-red: #fef2f2; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-red); margin: 0; padding: 0; }

        /* Splash Screen Animation */
        #splash { position: fixed; inset: 0; background: var(--primary-red); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 1000; animation: fadeOut 0.8s forwards 2.5s; }
        .ambulance-container { position: relative; font-size: 50px; margin-bottom: 20px; animation: drive 2s ease-in-out infinite; }
        .cow-on-top { position: absolute; font-size: 22px; top: -18px; left: 12px; color: #fff; animation: bounce 1s infinite alternate; }
        @keyframes drive { 0% { transform: translateX(-20px); } 50% { transform: translateX(20px); } 100% { transform: translateX(-20px); } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Main App Layout */
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--white); box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 30px; position: relative; }
        
        .founder-header { background: var(--primary-red); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; background: #e5e7eb; margin: 0 auto 10px auto; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Menu Boxes */
        .nav-grid { display: flex; flex-direction: column; gap: 20px; padding: 25px 20px; }
        .nav-card { background: var(--white); border: 2px solid var(--primary-red); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 16px rgba(225, 29, 72, 0.08); }
        .nav-card:active { transform: scale(0.97); }
        .nav-card i { font-size: 38px; color: var(--primary-red); margin-bottom: 12px; }
        .nav-card h3 { color: #1f2937; margin: 0; font-size: 18px; font-weight: 600; }

        /* Pages */
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Modern Form Inputs */
        label { font-size: 12px; font-weight: 600; color: #4b5563; text-transform: uppercase; display: block; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 12px; margin-top: 5px; box-sizing: border-box; font-family: 'Poppins', sans-serif; font-size: 14px; background: #f9fafb; }
        
        /* Advanced Image Preview Rows */
        .preview-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; align-items: center; }
        .image-preview-slot { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed var(--primary-red); display: flex; align-items: center; justify-content: center; background: #f9fafb; overflow: hidden; position: relative; }
        .image-preview-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Camera/Plus Wrapper */
        .add-photo-btn { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; background: #f3f4f6; cursor: pointer; position: relative; }
        .add-photo-btn i { font-size: 20px; color: #4b5563; }
        .add-photo-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; }

        /* WhatsApp Style Location Button */
        .location-btn { background-color: #128c7e; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 8px; box-shadow: 0 4px 10px rgba(18, 140, 126, 0.2); }
        .location-btn.success { background-color: #059669; }

        /* Clickable Map Link Display Box */
        .map-link-box { display: none; background: #eff6ff; border: 2px solid #3b82f6; border-radius: 12px; padding: 15px; margin-top: 12px; text-align: center; }
        .map-link-box a { color: #1d4ed8; font-weight: 700; text-decoration: none; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .btn-submit { background: var(--primary-red); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
        .back-btn { background: none; border: none; color: #6b7280; font-weight: 600; margin-top: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <!-- Animating Splash Screen -->
    <div id="splash">
        <div class="ambulance-container">
            <i class="fas fa-cow cow-on-top"></i>
            <i class="fas fa-ambulance"></i>
        </div>
        <h1 style="font-size: 24px; font-weight: 700; letter-spacing: 0.5px; margin: 0;">Bejuban ki Pukar</h1>
    </div>

    <div class="app-container">
        <!-- Top Profile Card -->
        <div class="founder-header">
            <div class="profile-pic">
                <img src="raj.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Raj+Malviya&background=ffffff&color=e11d48&size=120'" alt="Raj Malviya">
            </div>
            <h2 style="margin: 0; font-size: 20px; font-weight: 700;">Raj Malviya</h2>
            <p style="margin: 3px 0 0 0; opacity: 0.9; font-size: 13px; font-weight: 300;">Founder, Ujjain Animal Rescue</p>
        </div>

        <!-- Homepage Grid -->
        <div id="home" class="page active">
            <div class="nav-grid">
                <div class="nav-card" onclick="showPage('rescue-form')">
                    <i class="fas fa-notes-medical"></i>
                    <h3>Rescue Request</h3>
                </div>
                <div class="nav-card" onclick="showPage('history')">
                    <i class="fas fa-history"></i>
                    <h3>Rescue History</h3>
                </div>
                <div class="nav-card" onclick="showPage('live-req')">
                    <i class="fas fa-broadcast-tower"></i>
                    <h3>Live Requests</h3>
                </div>
            </div>
        </div>

        <!-- Form Screen -->
        <div id="rescue-form" class="page">
            <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back to Home</button>
            <h2 style="color: var(--primary-red); margin-top: 15px; font-size: 22px;">New Rescue Request</h2>
            
            <form id="main-rescue-form">
                <label>Pashu ka Prakar (Animal)*</label>
                <select required>
                    <option value="">Chuniye...</option>
                    <option value="cow">Gai (Cow)</option>
                    <option value="calf">Bachhda (Calf)</option>
                </select>

                <!-- Dynamic Photo Grid Section for Animal -->
                <label>Ghav ya Pashu ki Live Photo (Direct Camera)*</label>
                <div class="preview-container" id="animal-photos-container">
                    <div class="add-photo-btn">
                        <i class="fas fa-camera"></i>
                        <input type="file" accept="image/*" capture="camera" onchange="handlePhotoUpload(this, 'animal-photos-container')">
                    </div>
                </div>

                <!-- WhatsApp Style Location Area -->
                <label>Ujjain Exact Location*</label>
                <button type="button" id="loc-btn" class="location-btn" onclick="getExactLocation()">
                    <i class="fas fa-crosshairs"></i> Send your current location
                </button>
                
                <!-- Dynamic Navigation Link Box -->
                <div id="map-link-container" class="map-link-box">
                    <a id="google-maps-link" href="#" target="_blank">
                        <i class="fas fa-map-location-dot"></i> Tap to View Direction Link
                    </a>
                </div>
                <input type="hidden" id="lat-long-data" required>

                <label>Aapka Mobile Number*</label>
                <input type="tel" placeholder="10 Digits ka number" required>

                <!-- Dynamic Photo Grid Section for Reporter -->
                <label>Rescue Request Dalne Wale ki Live Photo (Direct Camera)*</label>
                <div class="preview-container" id="reporter-photos-container">
                    <div class="add-photo-btn">
                        <i class="fas fa-camera"></i>
                        <input type="file" accept="image/*" capture="camera" onchange="handlePhotoUpload(this, 'reporter-photos-container')">
                    </div>
                </div>

                <button type="button" class="btn-submit">Pay ₹30 & Submit Request</button>
            </form>
        </div>
        
        <!-- Other Pages placeholders -->
        <div id="history" class="page">
            <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 style="color: var(--primary-red);">Rescue History</h2>
            <p style="color: #6b7280; font-size: 14px;">Purane ilaj aur cases ki details yahan dikhengi.</p>
        </div>

        <div id="live-req" class="page">
            <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 style="color: var(--primary-red);">Live Active Requests</h2>
            <p style="color: #6b7280; font-size: 14px;">Ujjain ke chal rahe cases ki live list yahan aayegi.</p>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // Handle Dynamic Preview Rows & Add More (+) Functionality
        function handlePhotoUpload(input, containerId) {
            const container = document.getElementById(containerId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Create Thumbnail Slot
                    const slot = document.createElement('div');
                    slot.className = 'image-preview-slot';
                    slot.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    
                    // Add before the add button
                    const addButton = container.querySelector('.add-photo-btn');
                    container.insertBefore(slot, addButton);
                    
                    // Modify Add Button icon to a clean '+' icon for extra photos
                    addButton.querySelector('i').className = 'fas fa-plus';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // Strict WhatsApp Style Location Trigger
        function getExactLocation() {
            const btn = document.getElementById('loc-btn');
            const mapBox = document.getElementById('map-link-container');
            const mapLink = document.getElementById('google-maps-link');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Getting Current Spot...';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        
                        document.getElementById('lat-long-data').value = lat + "," + lng;
                        
                        btn.innerHTML = '<i class="fas fa-check-circle"></i> Current Location Sent!';
                        btn.classList.add('success');
                        
                        // Creates clean mapping directly to user spot coordinates
                        mapLink.href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                        mapLink.innerHTML = `<i class="fas fa-map-location-dot"></i> 📍 Live Location Active (Tap to Navigate)`;
                        mapBox.style.display = 'block';
                    },
                    (err) => {
                        btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> GPS Access Required.';
                        alert("Kripya mobile screen ke top se Location/GPS icon ko switch ON karein aur Chrome popup aane par 'Allow' par click karein!");
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                alert("Device doesn't support live tracking.");
            }
        }
    </script>
</body>
</html>
