<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjain Animal Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-red: #e11d48; --soft-red: #fef2f2; --white: #ffffff; --green-whatsapp: #00a884; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-red); margin: 0; padding: 0; }

        /* Splash Screen Animation */
        #splash { position: fixed; inset: 0; background: var(--primary-red); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; animation: fadeOut 0.5s ease 2.5s forwards; }
        .ambulance-container { position: relative; font-size: 50px; margin-bottom: 20px; animation: drive 2s ease-in-out infinite; }
        .cow-on-top { position: absolute; font-size: 22px; top: -18px; left: 12px; color: #fff; animation: bounce 1s ease infinite; }
        @keyframes drive { 0% { transform: translateX(-20px); } 50% { transform: translateX(20px); } 100% { transform: translateX(-20px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--white); box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 30px; position: relative; }
        .founder-header { background: var(--primary-red); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; background: #e5e7eb; margin: 0 auto 10px auto; overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .nav-grid { display: flex; flex-direction: column; gap: 20px; padding: 25px 20px; }
        .nav-card { background: var(--white); border: 2px solid var(--soft-red); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-card:active { transform: scale(0.97); }
        .nav-card i { font-size: 38px; color: var(--primary-red); margin-bottom: 12px; }

        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        label { font-size: 12px; font-weight: 600; color: #4b5563; text-transform: uppercase; display: block; margin-bottom: 8px; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 12px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-red); outline: none; }

        .preview-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; align-items: center; }
        .image-preview-slot { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed var(--primary-red); overflow: hidden; }
        .image-preview-slot img { width: 100%; height: 100%; object-fit: cover; }
        .add-photo-btn { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .add-photo-btn i { font-size: 20px; color: #4b5563; }

        .btn-trigger-gps, .btn-submit { padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-trigger-gps { background-color: var(--green-whatsapp); color: white; border: none; }
        .btn-submit { background: var(--primary-red); color: white; border: none; margin-top: 20px; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3); }

        #customAlert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 330px; border-radius: 18px; padding: 24px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .btn-ok { width: 100%; padding: 12px; background: #e11d48; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="ambulance-container">
            <i class="fas fa-cow cow-on-top"></i>
            <i class="fas fa-ambulance"></i>
        </div>
        <h1 style="color: white; font-size: 24px; font-weight: 700;">Bejuban ki Pukar</h1>
    </div>

    <div class="app-container">
        <div class="founder-header">
            <div class="profile-pic">
                <img src="Screenshot_2026-07-19-19-13-38-60_1c337646f29875672b5a61192b9010f9.jpg" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <h2>Raj Malviya</h2>
            <p>Founder, Ujjain Animal Rescue</p>
        </div>

        <!-- HOME PAGE -->
        <div id="home" class="page active">
            <div class="nav-grid">
                <div class="nav-card" onclick="showPage('rescue-form')"><i class="fas fa-notes-medical"></i><h3>Rescue Request</h3></div>
                <div class="nav-card" onclick="showPage('history')"><i class="fas fa-history"></i><h3>Rescue History</h3></div>
                <div class="nav-card" onclick="showPage('live-req')"><i class="fas fa-broadcast-tower"></i><h3>Live Requests</h3></div>
            </div>
        </div>

        <!-- RESCUE FORM -->
        <div id="rescue-form" class="page">
            <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back to Home</button>
            <h2 style="color: var(--primary-red); margin: 15px 0 20px;">New Rescue Request</h2>
            
            <form id="main-rescue-form">
                <label>Pashu ka Prakar (Animal)*</label>
                <select id="animal-type" required>
                    <option value="">Chuniye...</option>
                    <option value="cow">Gai (Cow)</option>
                    <option value="calf">Bachhda (Calf)</option>
                </select>

                <label>Ghav ya Pashu ki Live Photo*</label>
                <div class="preview-container" id="animal-photos-container">
                    <div class="add-photo-btn">
                        <i class="fas fa-camera"></i>
                        <input type="file" accept="image/*" capture="camera" onchange="handlePhotoUpload(this, 'animal-photos-container')">
                    </div>
                </div>

                <label>Ujjain Location Selection*</label>
                <button type="button" id="init-gps-btn" class="btn-trigger-gps" onclick="requestSystemGPS()">
                    <i class="fas fa-map-marker-alt"></i> Share Request Location
                </button>

                <div id="sub-loc-options" class="whatsapp-loc-container" style="display:none;">
                    <!-- loc options same as before -->
                    <div class="loc-option live" onclick="processLocation('live')"><div class="icon-circle"><i class="fas fa-location-dot"></i></div><div class="loc-option-text"><h4>Share live location</h4><p>Updates dynamically</p></div></div>
                    <div class="loc-option current" onclick="processLocation('current')"><div class="icon-circle"><i class="fas fa-crosshairs"></i></div><div class="loc-option-text"><h4>Send current location</h4><p>Fixed spot</p></div></div>
                </div>

                <div id="whatsapp-map-preview" class="whatsapp-map-card" style="display:none;">
                    <!-- map card same -->
                    <div class="map-static-visual"><i class="fas fa-map-pin map-pin-center"></i></div>
                    <div class="map-card-details">
                        <div class="map-card-info">
                            <span class="map-card-title" id="card-status-title">📍 Location Selected</span>
                            <span class="map-card-subtitle" id="card-status-subtitle"></span>
                        </div>
                        <a id="map-redirect-link" href="#" target="_blank" class="map-card-action-btn">Open Maps</a>
                    </div>
                </div>

                <input type="hidden" id="lat-long-data">
                <input type="hidden" id="selected-loc-type">

                <label>Aapka Mobile Number*</label>
                <input type="tel" id="phone" placeholder="10 Digits ka number" required>

                <label>Reporter ki Photo*</label>
                <div class="preview-container" id="reporter-photos-container">
                    <div class="add-photo-btn">
                        <i class="fas fa-camera"></i>
                        <input type="file" accept="image/*" capture="camera" onchange="handlePhotoUpload(this, 'reporter-photos-container')">
                    </div>
                </div>

                <button type="button" id="submit-btn" class="btn-submit">Pay ₹30 & Submit Request</button>
            </form>
        </div>

        <!-- Other pages same as before -->
        <div id="history" class="page">... (same)</div>
        <div id="live-req" class="page">... (same)</div>
    </div>

    <!-- Custom Alert -->
    <div id="customAlert">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">⚠️</div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-text" id="errorMsg"></div>
            <button class="btn-ok" onclick="document.getElementById('customAlert').style.display='none'">OK</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // === तुम्हारा Firebase Config ===
        const firebaseConfig = {
            apiKey: "AIzaSyCUxCLd6j3wGlmfsqDjQeyH0zBTOQ4YCDI",
            authDomain: "ujjainanimalrescue.firebaseapp.com",
            projectId: "ujjainanimalrescue",
            storageBucket: "ujjainanimalrescue.firebasestorage.app",
            messagingSenderId: "686634974496",
            appId: "1:686634974496:web:8b56642568a257e49fab45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ============== Existing Functions (shortened for space) ==============
        let watchId = null;

        function showPage(pageId) { /* same as before */ }
        function handlePhotoUpload(input, containerId) { /* same */ }
        function requestSystemGPS() { /* same */ }
        function processLocation(type) { /* same */ }
        function updateLocationUI(lat, lng, title, subtitle) { /* same */ }
        function handleLocError() { /* same */ }
        function showCustomAlert(title, message, isError = true) { /* same */ }

        // ==================== FIREBASE SAVE FUNCTION ====================
        async function saveRescueRequest() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Saving...';

            try {
                const animalType = document.getElementById('animal-type').value;
                const phone = document.getElementById('phone').value.trim();
                const location = document.getElementById('lat-long-data').value;
                const locType = document.getElementById('selected-loc-type').value;

                if (!animalType || !phone || !location) {
                    throw new Error("कुछ जानकारी missing है");
                }

                const rescueData = {
                    animalType: animalType,
                    phone: phone,
                    location: location,
                    locationType: locType,
                    status: "pending",
                    timestamp: serverTimestamp(),
                    createdAt: new Date().toISOString()
                };

                const docRef = await addDoc(collection(db, "rescueRequests"), rescueData);
                
                showCustomAlert("✅ Request Submitted!", `Request ID: ${docRef.id}\nTeam soon contact करेगा।`, false);
                
                // Reset form after success
                document.getElementById('main-rescue-form').reset();
                document.getElementById('whatsapp-map-preview').style.display = 'none';
                document.getElementById('sub-loc-options').style.display = 'none';
                document.getElementById('init-gps-btn').style.display = 'block';

            } catch (error) {
                console.error("Firebase Error:", error);
                showCustomAlert("❌ Error", "Request save nahi ho pa raha. Baad mein try karein.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Pay ₹30 & Submit Request';
            }
        }

        // Submit Button Listener
        document.getElementById('submit-btn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Your existing validation logic here...
            const phoneInput = document.getElementById('phone');
            const val = phoneInput.value.trim();
            
            if (val === "" || !/^[6-9]\d{9}$/.test(val)) {
                showCustomAlert("❌ Galat Number", "Sahi 10 digit mobile number dalein.");
                return;
            }

            const latLong = document.getElementById('lat-long-data').value;
            if (!latLong) {
                showCustomAlert("📍 Location Required", "Pehle location share karein!");
                return;
            }

            // Call Firebase save
            saveRescueRequest();
        });

        // Make functions global
        window.showPage = showPage;
        window.handlePhotoUpload = handlePhotoUpload;
        window.requestSystemGPS = requestSystemGPS;
        window.processLocation = processLocation;
        window.updateLocationUI = updateLocationUI;
        window.handleLocError = handleLocError;
        window.showCustomAlert = showCustomAlert;
    </script>
</body>
</html>
