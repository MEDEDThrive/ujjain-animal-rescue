<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjain Animal Rescue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT.appspot.com", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID" };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.addDoc = addDoc;
        window.collection = collection;
    </script>

    <style>
        :root { --primary-red: #e11d48; --soft-red: #fef2f2; --white: #ffffff; --green-whatsapp: #00a884; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-red); margin: 0; padding: 0; }
        #splash { position: fixed; inset: 0; background: var(--primary-red); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; animation: fadeOut 0.5s ease 2.5s forwards; }
        .ambulance-container { position: relative; font-size: 50px; margin-bottom: 20px; animation: drive 2s ease-in-out infinite; }
        .cow-on-top { position: absolute; font-size: 22px; top: -18px; left: 12px; color: #fff; animation: bounce 1s ease infinite; }
        @keyframes drive { 0% { transform: translateX(-20px); } 50% { transform: translateX(20px); } 100% { transform: translateX(-20px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--white); box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 30px; position: relative; }
        .founder-header { background: var(--primary-red); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 3px solid white; background: #e5e7eb; margin: 0 auto 10px auto; overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .nav-grid { display: flex; flex-direction: column; gap: 20px; padding: 25px 20px; }
        .nav-card { background: var(--white); border: 2px solid var(--soft-red); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .nav-card:active { transform: scale(0.97); }
        .nav-card i { font-size: 38px; color: var(--primary-red); margin-bottom: 12px; }
        .nav-card h3 { color: #1f2937; margin: 0; font-size: 18px; font-weight: 600; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        label { font-size: 12px; font-weight: 600; color: #4b5563; text-transform: uppercase; display: block; margin-bottom: 8px; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #d1d5db; border-radius: 12px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; align-items: center; }
        .image-preview-slot { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed var(--primary-red); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .image-preview-slot img { width: 100%; height: 100%; object-fit: cover; }
        .add-photo-btn { width: 65px; height: 65px; border-radius: 12px; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .add-photo-btn i { font-size: 20px; color: #4b5563; }
        .add-photo-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; }
        .btn-trigger-gps { background-color: var(--green-whatsapp); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp-loc-container { display: none; background: #f0fdf4; border: 1px solid #d1d5db; border-radius: 12px; padding: 10px; margin-bottom: 15px; }
        .loc-option { background: white; border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 8px; }
        .whatsapp-map-card { display: none; background: #1f2c34; border-radius: 14px; overflow: hidden; margin-top: 12px; position: relative; }
        .btn-submit { background: var(--primary-red); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .back-btn { background: none; border: none; color: #6b7280; font-weight: 600; margin-top: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 10px 0; }
        #customAlert { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 330px; border-radius: 18px; padding: 24px; text-align: center; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="ambulance-container"><i class="fas fa-cow cow-on-top"></i><i class="fas fa-ambulance"></i></div>
        <h1 style="color: white; font-size: 24px; font-weight: 700; letter-spacing: 0.5px; margin: 0;">Bejuban ki Pukar</h1>
    </div>

    <div class="app-container">
        <div class="founder-header">
            <div class="profile-pic"><img src="Screenshot_2026-07-19-19-13-38-60_1c337646f29875672b5a61192b9010f9.jpg"></div>
            <h2>Raj Malviya</h2>
            <p>Founder, Ujjain Animal Rescue</p>
        </div>

        <div id="home" class="page active">
            <div class="nav-grid">
                <div class="nav-card" onclick="showPage('rescue-form')"><i class="fas fa-notes-medical"></i><h3>Rescue Request</h3></div>
                <div class="nav-card" onclick="showPage('history')"><i class="fas fa-history"></i><h3>Rescue History</h3></div>
                <div class="nav-card" onclick="showPage('live-req')"><i class="fas fa-broadcast-tower"></i><h3>Live Requests</h3></div>
            </div>
        </div>

        <div id="rescue-form" class="page">
            <button class="back-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i> Back to Home</button>
            <form id="main-rescue-form">
                <label>Pashu ka Prakar*</label>
                <select id="animal-type" required><option value="cow">Gai (Cow)</option><option value="calf">Bachhda (Calf)</option></select>
                <label>Ujjain Location Selection*</label>
                <button type="button" id="init-gps-btn" class="btn-trigger-gps" onclick="requestSystemGPS()">Share Location</button>
                <input type="hidden" id="lat-long-data" required>
                <label>Aapka Mobile Number*</label>
                <input type="tel" id="user-phone" placeholder="10 Digits" required>
                <button type="submit" class="btn-submit">Submit Request</button>
            </form>
        </div>

        <div id="history" class="page"><button class="back-btn" onclick="showPage('home')">Back</button></div>
        <div id="live-req" class="page"><button class="back-btn" onclick="showPage('home')">Back</button></div>
    </div>

    <div id="customAlert"><div class="modal-content"><button class="btn-ok" onclick="document.getElementById('customAlert').style.display='none'">OK</button></div></div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function requestSystemGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('lat-long-data').value = pos.coords.latitude + "," + pos.coords.longitude;
                alert("Location captured!");
            });
        }

        // Firebase Submit
        document.getElementById('main-rescue-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('user-phone').value;
            const type = document.getElementById('animal-type').value;
            const loc = document.getElementById('lat-long-data').value;
            try {
                await addDoc(collection(window.db, "rescue_requests"), { phone: phone, animal: type, location: loc, time: new Date() });
                alert("Request Saved!");
            } catch (err) { alert("Error!"); }
        });
    </script>
</body>
</html>
